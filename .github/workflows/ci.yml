name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Package smoke test
        run: |
          npm pack --pack-destination /tmp
          npm install -g /tmp/miniapp-audit-*.tgz
          miniapp-audit fixtures/vulnerable-miniapp --format json --output /tmp/report.json
          node -e "const r=require('/tmp/report.json'); if (!r.findings?.length) process.exit(1)"
